spring.datasource.url=jdbc:mysql://localhost:3306/lox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=lox
spring.datasource.password=lox
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${SECRET_JWT}

seed.user.nome=${SEED_USER_NOME}
seed.user.email=${SEED_USER_EMAIL}
seed.user.senha=${SEED_USER_SENHA}
