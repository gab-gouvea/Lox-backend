spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lox}
spring.datasource.username=${DATABASE_USERNAME:lox}
spring.datasource.password=${DATABASE_PASSWORD:lox}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

jwt.secret=${SECRET_JWT}

seed.user.nome=${SEED_USER_NOME}
seed.user.email=${SEED_USER_EMAIL}
seed.user.senha=${SEED_USER_SENHA}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

cloudinary.url=${CLOUDINARY_URL}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


